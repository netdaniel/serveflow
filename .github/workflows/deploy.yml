name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # Use this instead of ssh-action
      - name: 🚀 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ 
          server-dir: public_html/
          # This ensures old files are removed so the server stays clean
          delete-destination: false 

      # OPTIONAL: If you need to tell cPanel to restart the Node app
      - name: 🔄 Trigger App Restart
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true # This prevents the whole build from failing if SSH is still blocked
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22 # or your discovered SSH port
          script: |
            cd public_html
            touch tmp/restart.txt