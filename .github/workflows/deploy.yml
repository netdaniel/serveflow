name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Navigate to app directory
          cd /var/www/rosterflow
          
          # Backup current version
          cp -r . ./backup-$(date +%Y%m%d-%H%M%S)
          
          # Copy new build files
          rsync -av --delete $GITHUB_WORKSPACE/dist/ ./
          
          # Restart web server if using nginx
          sudo systemctl reload nginx || echo "Nginx not found, skipping reload"
          
          # Or restart PM2 if using PM2
          pm2 reload rosterflow || echo "PM2 not found, skipping reload"
          
          echo "Deployment completed successfully!"